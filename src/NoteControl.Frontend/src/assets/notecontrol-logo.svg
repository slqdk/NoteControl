<!--
  NoteControl logo — LARGE SIZE variant (v2).

  Used for:
    - Tray .ico frames at 48 / 64 / 256
    - Favicon (SVG + apple-touch)
    - Frontend top-bar logo at 40px

  Iteration 2 changes from v1 (driven by Ship C feedback —
  the logo at 28px in the topbar read as "small button"
  rather than logo because the brackets were too thin and
  too close to the folder):

    - Bracket stroke 3 -> 4 so the brackets read clearly
      as a frame at 40px topbar size. They were getting
      lost against the picker pills next to them.
    - Brackets moved slightly outward (left bracket x:6->4,
      right bracket x:58->60) so they frame the folder
      with more visible whitespace between bracket and
      folder. This is what makes them read as "brackets
      around something" instead of "decorative line next
      to a button".
    - Bracket arms lengthened (y:14..50 -> y:12..52) so the
      visual proportion matches the folder's vertical span.
    - Folder geometry unchanged from v1 — the issue was
      the framing, not the folder itself.

  Placeholder substitution (unchanged from v1):
    #2563EB #1E40AF #FFFFFF
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"
     width="64" height="64">
  <g fill="none" stroke="#1E40AF" stroke-width="4"
     stroke-linecap="square" stroke-linejoin="miter">
    <path d="M 10 12 L 4 12 L 4 52 L 10 52"/>
    <path d="M 54 12 L 60 12 L 60 52 L 54 52"/>
  </g>

  <path d="M 14 20
           L 26 20
           L 30 24
           L 50 24
           L 50 46
           L 14 46
           Z"
        fill="#2563EB"
        stroke="#1E40AF"
        stroke-width="1.5"
        stroke-linejoin="round"/>

  <text x="32" y="40.5"
        text-anchor="middle"
        font-family="Arial Black, Helvetica, sans-serif"
        font-weight="900"
        font-size="14"
        fill="#FFFFFF"
        letter-spacing="0.5">NC</text>
</svg>
